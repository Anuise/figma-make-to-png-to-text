services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: analysis_tool
      POSTGRES_USER: analysis_tool
      POSTGRES_PASSWORD: analysis_tool
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analysis_tool -d analysis_tool"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://analysis_tool:analysis_tool@postgres:5432/analysis_tool
      SOURCE_PROJECTS_ROOT: /sources
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - type: bind
        source: ${SOURCE_PROJECTS_ROOT:-./tests/fixtures/sources}
        target: /sources
        read_only: true
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://analysis_tool:analysis_tool@postgres:5432/analysis_tool
      SOURCE_PROJECTS_ROOT: /sources
      ANALYSIS_DATA_ROOT: /data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const { Client } = require('pg'); (async () => { process.kill(1, 0); const client = new Client({ connectionString: process.env.DATABASE_URL }); await client.connect(); await client.query('SELECT 1'); await client.end(); })().catch(() => process.exit(1))
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - type: bind
        source: ${SOURCE_PROJECTS_ROOT:-./tests/fixtures/sources}
        target: /sources
        read_only: true
      - analysis-data:/data
  ai-worker:
    build:
      context: .
      dockerfile: apps/ai-worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://analysis_tool:analysis_tool@postgres:5432/analysis_tool
      ANALYSIS_DATA_ROOT: /data
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - --no-sync
        - python
        - -c
        - "import os,psycopg; psycopg.connect(os.environ['DATABASE_URL']).execute('SELECT 1')"
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - analysis-data:/data:ro
volumes:
  postgres-data:
  analysis-data:
